<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Crear Monedas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-2xl mx-auto p-8">
        <h1 class="text-4xl font-bold mb-8">Crear Nueva Moneda Bitcoin Premium</h1>
        <div class="bg-zinc-900 p-8 rounded-3xl">
            <label class="block mb-2">ID de Moneda (ej: 001)</label>
            <input id="id" type="text" value="002" class="w-full bg-zinc-800 p-4 rounded-2xl mb-6">
            <label class="block mb-2">Valor nominal en €</label>
            <input id="euroValue" type="number" value="50" class="w-full bg-zinc-800 p-4 rounded-2xl mb-8">
            <button onclick="generateLink()" class="w-full py-6 bg-amber-500 text-black font-bold text-xl rounded-3xl">GENERAR ENLACE NFC</button>
        </div>
        <div id="result" class="mt-8"></div>
    </div>
    <script>
        function generateLink() {
            const id = document.getElementById('id').value;
            const euros = document.getElementById('euroValue').value;
            const url = `https://cristiancgrd13-cpu.github.io/bitcoin-premium-edition/?id=${id}&euros=${euros}`;
            document.getElementById('result').innerHTML = `
                <p class="text-green-400">Enlace generado:</p>
                <a href="${url}" target="_blank" class="block bg-zinc-800 p-4 rounded-2xl break-all">${url}</a>
                <button onclick="navigator.clipboard.writeText('${url}')" class="mt-4 text-amber-400">Copiar</button>
            `;
        }
    </script>
</body>
</html>
