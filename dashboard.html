<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Bitcoin Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-4xl mx-auto p-8">
        <h1 class="text-4xl font-bold mb-8">Dashboard Bitcoin Premium Edition</h1>
        <div class="bg-zinc-900 p-8 rounded-3xl">
            <h2 class="text-2xl mb-6">Crear nueva moneda</h2>
            <div class="space-y-4">
                <input id="coin-id" type="text" placeholder="ID (ej: 002)" class="w-full bg-zinc-800 p-4 rounded-2xl">
                <input id="euro-value" type="number" value="50" placeholder="Valor en €" class="w-full bg-zinc-800 p-4 rounded-2xl">
                <button onclick="createCoin()" class="w-full bg-amber-500 hover:bg-amber-400 text-black font-bold py-4 rounded-2xl">Generar Enlace NFC</button>
            </div>
        </div>
        <div id="result" class="mt-8 hidden"></div>
    </div>

    <script>
        function createCoin() {
            const id = document.getElementById('coin-id').value || '001';
            const euros = document.getElementById('euro-value').value || 50;
            const url = `https://cristiancgrd13-cpu.github.io/bitcoin-premium-edition/?id=${id}&euros=${euros}`;
            const html = `
                <div class="bg-emerald-900 p-6 rounded-3xl">
                    <p class="text-emerald-400">Moneda #${id} creada!</p>
                    <a href="${url}" target="_blank" class="block mt-4 underline">${url}</a>
                    <button onclick="copyLink('${url}')" class="mt-4 bg-white text-black px-6 py-2 rounded-xl">Copiar enlace</button>
                </div>`;
            document.getElementById('result').innerHTML = html;
            document.getElementById('result').classList.remove('hidden');
        }
        function copyLink(url) {
            navigator.clipboard.writeText(url);
            alert('¡Enlace copiado!');
        }
    </script>
</body>
</html>
