<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneda Física #001 - Bitcoin Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-amber-400 mb-1">Bitcoin Premium Edition</h1>
        <p class="text-xl text-amber-300 mb-12">Moneda Física #001</p>

        <div class="bg-zinc-900 rounded-3xl p-8 mb-8">
            <p class="text-amber-400 text-sm mb-2 tracking-widest">VALOR NOMINAL</p>
            <div id="nominal" class="text-6xl font-bold text-white mb-3">50 €</div>
            <div id="sats" class="text-4xl font-mono text-emerald-400">87.173 sats</div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
            <p class="text-xs text-zinc-400 mb-2">Precio de Bitcoin</p>
            <div id="btc-price" class="text-2xl font-mono text-amber-300">-- €</div>
        </div>

        <div id="qrcode" class="mx-auto mb-8 inline-block p-4 bg-white rounded-2xl"></div>

        <button onclick="copyLink()" class="w-full py-6 bg-amber-500 hover:bg-amber-600 text-black font-bold text-xl rounded-3xl transition-all">
            📋 Copiar enlace para NFC
        </button>

        <p class="text-xs text-zinc-500 mt-8">Valor nominal actualizado cada 15 segundos según BTC</p>
    </div>

    <script>
        const fixedSats = 87173; // Sats fijos comprados

        async function updatePrice() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur');
                const data = await res.json();
                const btcEur = data.bitcoin.eur;

                // Valor nominal en euros = (sats fijos / 100M) * precio BTC
                const nominalEur = (fixedSats / 100000000 * btcEur).toFixed(2);
                
                document.getElementById('nominal').innerHTML = nominalEur + ' <span class="text-4xl">€</span>';
                document.getElementById('sats').textContent = fixedSats.toLocaleString('es-ES') + ' sats';
                document.getElementById('btc-price').textContent = btcEur.toLocaleString('es-ES') + ' €';
            } catch(e) {
                console.error('Error al actualizar precio');
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert('✅ Enlace copiado! Pégalo en tu chip NFC.');
        }

        window.onload = () => {
            updatePrice();
            setInterval(updatePrice, 15000); // Cada 15 segundos

            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 220,
                height: 220,
                colorDark: "#f59e0b",
                colorLight: "#18181b"
            });
        };
    </script>
</body>
</html>
