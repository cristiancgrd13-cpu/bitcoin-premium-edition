<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Premium Edition #001</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .coin {
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .coin:hover {
            transform: rotateY(25deg) rotateX(15deg) scale(1.08);
        }
        .glow {
            box-shadow: 0 0 60px -10px rgb(245 158 11);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-zinc-950 to-black text-slate-100 flex items-center justify-center p-6">
    <div class="max-w-lg w-full">
        <div class="bg-zinc-900/90 backdrop-blur-2xl rounded-3xl shadow-2xl border border-amber-500/30 overflow-hidden">
            <div class="p-10 text-center">
                <h1 class="text-5xl font-bold mb-2 text-amber-400 tracking-tight">Bitcoin Premium Edition</h1>
                <p class="text-2xl text-amber-300 mb-10">Moneda Física #001</p>
                
                <div class="relative mx-auto mb-12" style="width: 320px; height: 320px;">
                    <img id="coinImage" src="assets/coin-001.png" 
                         class="coin mx-auto w-full h-full object-contain rounded-full shadow-2xl border-8 border-amber-500 glow" alt="Moneda Bitcoin Premium">
                </div>

                <div class="bg-zinc-800/80 rounded-3xl p-8 mb-10">
                    <p class="text-amber-400 text-sm uppercase tracking-widest mb-1">Valor nominal</p>
                    <p class="text-7xl font-bold text-white mb-2" id="euro">50 €</p>
                    <p class="text-4xl font-mono text-emerald-400" id="sats">---,--- sats</p>
                    <p class="text-xs text-slate-500 mt-4">Precio actualizado en tiempo real</p>
                </div>

                <div id="qrcode" class="mx-auto mb-10 bg-white p-4 rounded-2xl inline-block"></div>

                <button onclick="copyLink()" class="w-full py-6 bg-gradient-to-r from-amber-400 to-yellow-500 hover:from-amber-500 hover:to-yellow-600 text-black font-bold text-2xl rounded-3xl transition-all active:scale-95 shadow-xl">
                    📋 COPIAR ENLACE PARA NFC
                </button>
            </div>
        </div>
    </div>

    <script>
        async function updatePrice() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur');
                const data = await res.json();
                const btcPrice = data.bitcoin.eur;
                const sats = Math.round((50 / btcPrice) * 100_000_000);
                document.getElementById('sats').textContent = sats.toLocaleString('es-ES') + ' sats';
            } catch (e) {
                console.log('Error fetching price');
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('✅ Enlace copiado correctamente! Pégalo en tu chip NFC.');
            });
        }

        window.onload = function() {
            updatePrice();
            setInterval(updatePrice, 30000);

            // QR Code
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 260,
                height: 260,
                colorDark : "#000000",
                colorLight : "#ffffff",
            });
        };
    </script>
</body>
</html>
